version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: primehive_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: primehive
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - primehive_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: primehive_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - primehive_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API Server ───────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: primehive_server
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/primehive?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - primehive_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── React Client ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: primehive_client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - primehive_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: primehive_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - client
      - server
    networks:
      - primehive_net

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  primehive_net:
    driver: bridge
